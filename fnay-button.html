<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Five Night's At Yoshi's Launcher</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 235, 120, 0.35), transparent 60%),
                radial-gradient(circle at 80% 80%, rgba(82, 160, 60, 0.35), transparent 55%),
                linear-gradient(135deg, #0a3d1f 0%, #14663a 45%, #52a03c 100%);
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(255,255,255,0.04) 0px,
                    rgba(255,255,255,0.04) 2px,
                    transparent 2px,
                    transparent 40px
                ),
                radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.55) 100%);
            pointer-events: none;
        }
        .card {
            position: relative;
            text-align: center;
            padding: 44px 64px;
            border-radius: 22px;
            background: rgba(255, 245, 200, 0.92);
            border: 4px solid #1a1a1a;
            box-shadow:
                0 22px 65px rgba(0, 0, 0, 0.55),
                inset 0 0 0 2px #fffbe0;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 54px;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            color: #b91c1c;
            text-shadow:
                2px 2px 0 #1a1a1a,
                4px 4px 0 rgba(0,0,0,0.25);
            transform: rotate(-2deg);
        }
        p.subtitle {
            margin: 6px 0 34px;
            font-size: 16px;
            font-style: italic;
            color: #374151;
        }
        .btn {
            position: relative;
            display: inline-block;
            padding: 18px 56px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #1a1a1a;
            background: linear-gradient(135deg, #ffe066 0%, #f59e0b 100%);
            border: 3px solid #1a1a1a;
            border-radius: 14px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow:
                0 8px 0 #1a1a1a,
                0 10px 30px rgba(0, 0, 0, 0.35);
        }
        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #fff0a1 0%, #fbbf24 100%);
            box-shadow:
                0 10px 0 #1a1a1a,
                0 14px 40px rgba(0, 0, 0, 0.45);
        }
        .btn:hover::before { left: 125%; }
        .btn:active {
            transform: translateY(6px);
            box-shadow:
                0 2px 0 #1a1a1a,
                0 4px 18px rgba(0, 0, 0, 0.35);
        }
        .hint {
            margin-top: 22px;
            font-size: 12px;
            color: #374151;
            opacity: 0.85;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>FIVE NIGHT'S AT YOSHI'S</h1>
        <p class="subtitle">Survive five nights. Watch the cameras. Don't blink.</p>
        <button class="btn" id="launchBtn">Play Now</button>
        <div class="hint">Opens in a new about:blank tab</div>
    </div>

    <script>
        const GAME_CODE = `<!DOCTYPE html>



<!-- Ultimate Game Stash file--> 
<!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->



<html lang="en">
<base href="https://cdn.jsdelivr.net/gh/bubbls/ports@main/fnay/">
<style type="text/css">
  h1 {
	  font-family: Arial, Helvetica, sans-serif;
	  color: #F00;
	  font-size: x-large;
  }
  p {
	  font-family: Arial, Helvetica, sans-serif;
	  color: #000;
	  font-size: small;
  }
  body {
	  background-color: #FFF;
      text-align: center;
      margin: 0;
      padding: 0;
  }
  #bloctxt {
	  border-left-width: 5px;
	  border-left-style: solid;
	  border-left-color: #F00;
	  padding-left: 10px;
	  position: absolute;
	  left: 50%%;
	  width: 600px;
	  margin-left: -260px
  }
</style>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

  <!-- Enables full-screen on iOS devices -->
  <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="HandheldFriendly" content="true" />
<!-- I don't get paid enough to answer a request where the tab name is wrong. Well, it's fixed now. -->
  <title>Five Night's At Yoshi's</title>

	<script>
	   	// Detection of old browsers that do not support the canvas element
		// Falls back to a default page
	    if (!document.createElement("canvas").getContext)
	    {
			window.open("http://www.clickteam.com/html5-fallback", "_self");
		}
	</\script>


  	<!-- EXTRASOURCES -->
    <!-- Loads the Javascript code...-->
    <script src="src/Runtim.js"></\script>

  <script>

	// Detection of when the html file is ran locally.
	// You can remove this code for the final version
	if (window.location.protocol == "file:")
	{
		document.write('<div id="bloctxt">');
		document.write('<h1>The application cannot be run...</h1>');
		document.write('<p>HTML browsers do not allow you to launch data files directly from the file system.<br>');
		document.write('A drag & drop of the html file on a web-browser window will not work, on any machine.<br>');
		document.write('Please use the Build & Run option (it opens a local web server) to run your application,<br>')
		document.write('or upload your application folder to a remote web-server, and start it from there...</p>');
		document.write('</div>');
		throw new error("Cannot run application");
	}
  </\script>
</head>

<body>

<div style="display: inline-block; -webkit-user-select: none; text-align: left;">
    <canvas id="MMFCanvas" width="1280" height="720">
    	Your browser does not support Canvas.
    </canvas>
</div>

<script>
    // RUNTIMESTART
    // This is where the HTML5 runtime is actually started
    window.addEventListener("load", windowLoaded, false);
    function windowLoaded()
    {
        // Calls the runtime
        // First parameter : name of the canvas element
        // Second parameter : path to the cch file. Images and sounds must lay beside this file
        new Runtime("MMFCanvas", "resources/nnnn.cch");
    }
    // RUNTIMESTARTEND
</\script>

</body>
</html>
`;

        document.getElementById('launchBtn').addEventListener('click', () => {
            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert('Pop-up blocked! Please allow pop-ups to launch the game.');
                return;
            }
            win.document.open();
            win.document.write(GAME_CODE);
            win.document.close();
        });
    </script>
</body>
</html>
