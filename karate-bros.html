  <script type="text/javascript">
    // Intercept relative asset requests and redirect to CDN
    // KarateBros.js uses relative paths like "assets/audio/theme.m4a" internally
    var CDN_BASE = "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ba0d3910bd7dde2f6171c57d658113f9df69dd77/karate%20bros/";

    function rewriteUrl(url) {
      if (typeof url !== 'string') return url;
      // Rewrite relative paths starting with "assets/" to absolute CDN URLs
      if (url.match(/^assets\//)) {
        return CDN_BASE + url;
      }
      // Also catch "./assets/" style
      if (url.match(/^\.\/assets\//)) {
        return CDN_BASE + url.substring(2);
      }
      // Catch already-resolved absolute URLs (e.g. http://localhost:8080/assets/... or blob:null/assets/...)
      // The game engine resolves relative paths against the page origin before XHR.open is called
      var assetMatch = url.match(/\/assets\/(.*)/);
      if (assetMatch && !url.match(/cdn\.jsdelivr\.net/)) {
        return CDN_BASE + "assets/" + assetMatch[1];
      }
      return url;
    }

    // Override fetch
    var _origFetch = window.fetch;
    window.fetch = function(input, init) {
      if (typeof input === 'string') {
        input = rewriteUrl(input);
      } else if (input && input.url) {
        input = new Request(rewriteUrl(input.url), input);
      }
      return _origFetch.call(this, input, init);
    };

    // Override XMLHttpRequest.open
    var _origXHROpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url) {
      arguments[1] = rewriteUrl(url);
      return _origXHROpen.apply(this, arguments);
    };

    // Override Audio constructor to rewrite src
    var _origAudio = window.Audio;
    window.Audio = function(src) {
      if (src) src = rewriteUrl(src);
      return new _origAudio(src);
    };
    window.Audio.prototype = _origAudio.prototype;

    // Override Image src setter to rewrite relative asset paths
    var _origImageDescriptor = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
    Object.defineProperty(HTMLImageElement.prototype, 'src', {
      get: function() { return _origImageDescriptor.get.call(this); },
      set: function(val) { _origImageDescriptor.set.call(this, rewriteUrl(val)); },
      configurable: true
    });
  </script>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ba0d3910bd7dde2f6171c57d658113f9df69dd77/karate%20bros/KarateBros.js?th=23"></script>

  <script>
    // Prevent default touch/key behavior that interferes with game
    window.addEventListener("touchmove", function(event) {
      event.preventDefault();
    }, { capture: false, passive: false });

    if (typeof window.devicePixelRatio != 'undefined' && window.devicePixelRatio > 2) {
      var meta = document.getElementById("viewport");
      meta.setAttribute('content', 'width=device-width, initial-scale=' + (2 / window.devicePixelRatio) + ', user-scalable=no');
    }

    window.addEventListener('keydown', function(e) {
      if ((e.keyCode == 32 || e.keyCode == 38 || e.keyCode == 40) && e.target == document.body) {
        e.preventDefault();
      }
    });
  </script>

  <style>
    html, body {

      overflow: hidden;

    #openfl-content {

    // Fullscreen toggle
    function toggleFullScreen() {
      if ((document.fullScreenElement && document.fullScreenElement !== null) ||
          (!document.mozFullScreen && !document.webkitIsFullScreen)) {
        if (document.documentElement.requestFullScreen) {
          document.documentElement.requestFullScreen();
        } else if (document.documentElement.mozRequestFullScreen) {
          document.documentElement.mozRequestFullScreen();
        } else if (document.documentElement.webkitRequestFullScreen) {
          document.documentElement.webkitRequestFullScreen(Element.ALLOW_KEYBOARD_INPUT);
        }
      } else {
        if (document.cancelFullScreen) {
          document.cancelFullScreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.webkitCancelFullScreen) {
          document.webkitCancelFullScreen();
        }
      }
    }
  </script>

  <input class="button" type="button" value="Fullscreen" onclick="toggleFullScreen()" style="position: absolute; bottom: 0; right: 0; float: right; clear: right;">
