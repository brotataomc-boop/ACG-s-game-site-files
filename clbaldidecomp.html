<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baldi's Basics Ultra Decompile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&display=swap');
        body {
            background: #2a5a2a;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Patrick Hand', 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
        }
        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 42px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 3px 3px 0 #1a3a1a, -1px -1px 0 #1a3a1a, 1px -1px 0 #1a3a1a, -1px 1px 0 #1a3a1a;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 18px;
            color: #b0e0b0;
            margin-bottom: 35px;
            font-style: italic;
        }
        .chalk-line {
            width: 300px;
            height: 2px;
            background: rgba(255,255,255,0.3);
            margin: 0 auto 30px;
            border-radius: 1px;
        }
        .btn {
            position: relative;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Permanent Marker', cursive;
            color: #1a3a1a;
            background: linear-gradient(135deg, #4CAF50, #8BC34A, #CDDC39);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.4), inset 0 -3px 0 rgba(0,0,0,0.15);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 40px rgba(76, 175, 80, 0.6), inset 0 -3px 0 rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #66BB6A, #AED581, #DCE775);
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3), inset 0 -1px 0 rgba(0,0,0,0.15);
        }
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(76,175,80,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
        }
        .chalk-doodle {
            position: absolute;
            font-size: 40px;
            opacity: 0.15;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        .chalk-doodle:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .chalk-doodle:nth-child(2) { top: 15%; right: 12%; animation-delay: 1s; }
        .chalk-doodle:nth-child(3) { bottom: 15%; left: 15%; animation-delay: 2s; }
        .chalk-doodle:nth-child(4) { bottom: 10%; right: 10%; animation-delay: 3s; }
        .chalk-doodle:nth-child(5) { top: 50%; left: 5%; animation-delay: 1.5s; }
        .chalk-doodle:nth-child(6) { top: 50%; right: 5%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .notebook-count {
            margin-top: 25px;
            font-size: 15px;
            color: #8fbf8f;
            letter-spacing: 1px;
        }
    </style>
</head>

        function launchGame() {
            var btn = document.querySelector('.btn');
            btn.textContent = 'LOADING...';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.7';

            setTimeout(function() {
                try {
                    var html = atob(GAME_B64);
                    var w = window.open('', '_blank');
                    if (w) {
                        w.document.open();
                        w.document.write(html);
                        w.document.close();
                    } else {
                        document.open();
                        document.write(html);
                        document.close();
                    }
                } catch (e) {
                    alert('Failed to launch game: ' + e.message);
                }
                btn.textContent = 'PLAY NOW';
                btn.style.pointerEvents = '';
                btn.style.opacity = '';
            }, 100);
        }
