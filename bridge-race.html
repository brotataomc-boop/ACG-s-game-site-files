<!DOCTYPE html>
<html lang="en-us">

<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@213d19aad1db5acdebe8e07a80ae4998f3146e33/bridge-race/">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>Bridge Race</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <script>
    // Stub out the YouTube Game SDK so Unity doesn't crash when it
    // tries to call SDK methods outside the YouTube iframe context.
    window.ytgame = {
      game: {
        firstFrameReady: function() {},
        gameReady: function() {},
        sendScore: function() { return Promise.resolve(); },
        loadData: function() { return Promise.resolve(null); },
        saveData: function() { return Promise.resolve(); },
      },
      system: {
        isAudioEnabled: function() { return Promise.resolve(true); },
        onAudioEnabledChange: function() {},
        onPause: function() {},
        onResume: function() {},
        getLanguage: function() { return Promise.resolve("en"); },
      },
      ads: {
        requestAd: function() { return Promise.resolve(0); },
      },
      IN_PLAYABLES_ENV: false,
      SDK_VERSION: "stub",
    };
  </script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #231F20;
    }
    #unity-container {
      width: 100%;
      height: 100%;
    }
    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #unity-progress-bar-empty {
      width: 200px;
      height: 10px;
      background: #555;
      border-radius: 5px;
      margin-top: 10px;
    }
    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #4CAF50;
      border-radius: 5px;
      transition: width 0.2s;
    }
    #load-status {
      color: #aaa;
      font-family: sans-serif;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <script src="unarchiver.min.js"></script>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div id="load-status">Loading Bridge Race...</div>
    </div>
    <div id="unity-warning"></div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var loadStatus = document.querySelector("#load-status");

    function unityShowBanner(msg, type) {
      console.warn("Unity banner:", type, msg);
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/BridgeRace.loader.js";
    var config = {
      dataUrl: buildUrl + "/BridgeRace.data.unityweb",
      frameworkUrl: buildUrl + "/BridgeRace.framework.js.unityweb",
      codeUrl: buildUrl + "/BridgeRace.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Garawell",
      productName: "Bridge Race",
      productVersion: "3.21",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onerror = function() {
      loadStatus.textContent = "Failed to load game engine. Check your connection.";
      loadStatus.style.color = "#e74c3c";
    };
    script.onload = function() {
      loadStatus.textContent = "Starting game engine...";
      createUnityInstance(canvas, config, function(progress) {
        progressBarFull.style.width = (100 * progress) + "%";
        if (progress < 1) {
          loadStatus.textContent = "Loading... " + Math.round(progress * 100) + "%";
        }
      }).then(function(unityInstance) {
        loadingBar.style.display = "none";
      }).catch(function(message) {
        loadStatus.textContent = "Error: " + message;
        loadStatus.style.color = "#e74c3c";
        console.error("Unity load error:", message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
