<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bridge Race Launcher</title>
    <style>
        body {
            background: #0a0a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .btn {
            position: relative;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(255, 107, 53, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 35px rgba(255, 107, 53, 0.6);
            background: linear-gradient(135deg, #ff8c42, #ffad33);
        }
        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 15px rgba(255, 107, 53, 0.3);
        }
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }
    </style>
</head>
